<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — MyShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * { font-family: 'Poppins', sans-serif; }
    .bg-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  </style>
</head>

<body class="bg-gradient min-h-screen flex items-center justify-center px-4">

  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">

    <!-- Logo -->
    <div class="text-center mb-8">
      <i class="fa-solid fa-bag-shopping text-purple-600 text-4xl mb-3"></i>
      <h1 class="text-3xl font-bold text-purple-600">
        My<span class="text-gray-800">Shop</span>
      </h1>
      <p class="text-gray-400 text-sm mt-1">Create your account today!</p>
    </div>

    <!-- Error Message -->
    <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-4 text-sm">
    </div>

    <!-- Success Message -->
    <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-600 px-4 py-3 rounded-xl mb-4 text-sm">
    </div>

    <!-- Register Form -->
    <div class="space-y-4">

      <!-- Full Name -->
      <div>
        <label class="block text-gray-700 text-sm font-medium mb-1">
          Full Name
        </label>
        <div class="flex items-center bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
          <i class="fa-solid fa-user text-gray-400 mr-3"></i>
          <input
            type="text"
            id="name"
            placeholder="Enter your full name"
            class="bg-transparent outline-none w-full text-gray-700 text-sm"
          />
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 text-sm font-medium mb-1">
          Email Address
        </label>
        <div class="flex items-center bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
          <i class="fa-solid fa-envelope text-gray-400 mr-3"></i>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            class="bg-transparent outline-none w-full text-gray-700 text-sm"
          />
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-gray-700 text-sm font-medium mb-1">
          Password
        </label>
        <div class="flex items-center bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
          <i class="fa-solid fa-lock text-gray-400 mr-3"></i>
          <input
            type="password"
            id="password"
            placeholder="Create a password"
            class="bg-transparent outline-none w-full text-gray-700 text-sm"
          />
        </div>
      </div>

      <!-- Register Button -->
      <button
        onclick="register()"
        id="registerBtn"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl transition text-sm mt-2">
        <i class="fa-solid fa-user-plus mr-2"></i>Create Account
      </button>

    </div>

    <!-- Login Link -->
    <p class="text-center text-gray-400 text-sm mt-6">
      Already have an account?
      <a href="login.html" class="text-purple-600 hover:text-purple-800 font-medium">
        Login here
      </a>
    </p>

    <!-- Back to Home -->
    <p class="text-center mt-3">
      <a href="index.html" class="text-gray-400 hover:text-gray-600 text-sm">
        <i class="fa-solid fa-arrow-left mr-1"></i>Back to Home
      </a>
    </p>

  </div>

  <script>
    // =============================================
    // REGISTER FUNCTION
    // =============================================
    async function register() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      const registerBtn = document.getElementById('registerBtn');

      // Hide previous messages
      errorMsg.classList.add('hidden');
      successMsg.classList.add('hidden');

      // Validate fields
      if (!name || !email || !password) {
        errorMsg.textContent = '❌ Please fill in all fields!';
        errorMsg.classList.remove('hidden');
        return;
      }

      // Password length check
      if (password.length < 6) {
        errorMsg.textContent = '❌ Password must be at least 6 characters!';
        errorMsg.classList.remove('hidden');
        return;
      }

      // Disable button while loading
      registerBtn.textContent = 'Creating account...';
      registerBtn.disabled = true;

      try {
        // Send register request to backend
        const response = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await response.json();

        if (data.success) {
          // Show success message
          successMsg.textContent = `✅ Account created! Redirecting to login...`;
          successMsg.classList.remove('hidden');

          // Redirect to login after 2 seconds
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);

        } else {
          // Show error
          errorMsg.textContent = `❌ ${data.message}`;
          errorMsg.classList.remove('hidden');
          registerBtn.innerHTML = '<i class="fa-solid fa-user-plus mr-2"></i>Create Account';
          registerBtn.disabled = false;
        }

      } catch (error) {
        errorMsg.textContent = '❌ Cannot connect to server. Make sure server is running!';
        errorMsg.classList.remove('hidden');
        registerBtn.innerHTML = '<i class="fa-solid fa-user-plus mr-2"></i>Create Account';
        registerBtn.disabled = false;
      }
    }

    // Allow pressing Enter to register
    document.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') register();
    });
  </script>

</body>
</html>
